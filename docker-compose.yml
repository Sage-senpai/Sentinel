# ============================================================
#  SENTINEL — Local Development Docker Compose
#  Usage: docker compose up --build
# ============================================================

version: '3.9'

services:

  # ── Next.js frontend ──────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_ENVIRONMENT=development
      - NEXT_PUBLIC_PRIVY_APP_ID=${PRIVY_APP_ID}
      - NEXT_PUBLIC_FUUL_PROJECT_ID=${FUUL_PROJECT_ID}
      - NEXT_PUBLIC_ALERT_REGISTRY_ADDRESS=${ALERT_REGISTRY_ADDRESS}
    depends_on:
      - api
    restart: unless-stopped

  # ── FastAPI backend ───────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://sentinel:sentinel@postgres:5432/sentinel_dev
      - PACIFICA_API_URL=https://test-api.pacifica.fi/api/v1
      - PACIFICA_WS_URL=wss://test-ws.pacifica.fi
      - PACIFICA_API_KEY=${PACIFICA_API_KEY}
      - PACIFICA_API_SECRET=${PACIFICA_API_SECRET}
      - ELFA_API_KEY=${ELFA_API_KEY}
      - PRIVY_APP_SECRET=${PRIVY_APP_SECRET}
      - FUUL_API_KEY=${FUUL_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── AI Agent workers ──────────────────────────────────────
  workers:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.workers
    volumes:
      - ./apps/api:/app
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://sentinel:sentinel@postgres:5432/sentinel_dev
      - PACIFICA_API_URL=https://test-api.pacifica.fi/api/v1
      - PACIFICA_WS_URL=wss://test-ws.pacifica.fi
      - PACIFICA_API_KEY=${PACIFICA_API_KEY}
      - ELFA_API_KEY=${ELFA_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      # Agent toggles — set to 'false' to disable individual agents locally
      - AGENT_GUARD_ENABLED=true
      - AGENT_CASCADE_ENABLED=true
      - AGENT_WHALE_ENABLED=true
      - AGENT_FUNDING_ENABLED=true
      - AGENT_AFRICA_ENABLED=true
      - AGENT_BROADCAST_ENABLED=true
    depends_on:
      - redis
      - postgres
      - api
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis Commander (dev UI) ──────────────────────────────
  redis-ui:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    profiles:
      - debug

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinel_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Hardhat local node (for contract dev) ─────────────────
  hardhat:
    build:
      context: ./apps/contracts
      dockerfile: Dockerfile.hardhat
    ports:
      - "8545:8545"
    command: npx hardhat node --hostname 0.0.0.0
    profiles:
      - contracts
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:

networks:
  default:
    name: sentinel-network