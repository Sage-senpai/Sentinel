# ============================================================
#  SENTINEL — Scheduled Health Monitor
#  DISABLED until production backend is deployed.
#  To re-enable: uncomment the schedule trigger below.
# ============================================================

name: Production Health Monitor

on:
  # schedule:
  #   - cron: '*/15 * * * *'   # Re-enable when api.sentinel.app is live
  workflow_dispatch:             # Manual trigger only

jobs:
  health-check:
    name: Check All Services
    runs-on: ubuntu-latest
    steps:
      - name: API health endpoint
        run: |
          API_URL="${{ vars.PROD_API_URL || 'https://api.sentinel.app' }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$API_URL/health") || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "API DOWN (HTTP $STATUS)" && exit 1)

      - name: WebSocket connectivity
        run: |
          API_URL="${{ vars.PROD_API_URL || 'https://api.sentinel.app' }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$API_URL/health/ws") || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "WebSocket health FAIL" && exit 1)

      - name: Pacifica API reachability
        run: |
          API_URL="${{ vars.PROD_API_URL || 'https://api.sentinel.app' }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "$API_URL/health/pacifica") || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "Pacifica upstream FAIL" && exit 1)

      - name: All 6 agents running
        id: agent-check
        run: |
          API_URL="${{ vars.PROD_API_URL || 'https://api.sentinel.app' }}"
          RESPONSE=$(curl -sf --max-time 10 "$API_URL/health/agents") || exit 1
          ALL_OK=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          agents = data.get('agents', {})
          expected = ['guard', 'cascade_predictor', 'whale_intel', 'funding_forecast', 'africa_fx', 'alert_broadcast']
          failing = [a for a in expected if agents.get(a) != 'running']
          print(','.join(failing) if failing else 'ok')
          ")
          if [ "$ALL_OK" != "ok" ]; then
            echo "FAILING_AGENTS=$ALL_OK" >> $GITHUB_OUTPUT
            echo "Agents not running: $ALL_OK"
            exit 1
          fi
          echo "All 6 agents healthy."

      - name: Redis connectivity
        run: |
          API_URL="${{ vars.PROD_API_URL || 'https://api.sentinel.app' }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$API_URL/health/redis") || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "Redis DOWN" && exit 1)

      - name: Frontend reachable
        run: |
          FRONTEND_URL="${{ vars.PROD_FRONTEND_URL || 'https://sentinel.app' }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$FRONTEND_URL") || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "Frontend DOWN (HTTP $STATUS)" && exit 1)

      - name: Alert on any failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "SENTINEL PRODUCTION ALERT\nOne or more health checks FAILED.\nFailing agents: ${{ steps.agent-check.outputs.FAILING_AGENTS || 'N/A' }}\nInvestigate: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  weekly-audit:
    name: Weekly Lighthouse + Dep Check
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lighthouse weekly report
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ vars.PROD_FRONTEND_URL || 'https://sentinel.app' }}
            ${{ vars.PROD_FRONTEND_URL || 'https://sentinel.app' }}/dashboard
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
